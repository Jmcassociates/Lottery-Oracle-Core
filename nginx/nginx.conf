worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Basic Security Headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    # JMc - [2026-03-31] - Advanced Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: wss:;";
    server_tokens off;

    server {
        # JMc - 2026-03-18 - Cloud Run dynamic port injection
        listen ${PORT};
        server_name localhost;

        # JMc - [2026-04-03] - Unified Proxy Gateway
        # Forwards all /api requests to the FastAPI backend.
        location /api {
            proxy_pass ${BACKEND_URL};
            # JMc - Removed Host override to prevent Google Cloud Run 404 errors.
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Optimization for long-lived webhook connections
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Route everything else to the Frontend (served statically here)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}
